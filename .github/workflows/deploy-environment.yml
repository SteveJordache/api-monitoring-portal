name: Deploy Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - test
          - qa
          - prod

      image_tag:
        description: Docker image tag from ECR, normally a Git commit SHA
        required: true
        type: string

      confirmation:
        description: For PROD enter deploy-prod. For other environments enter deploy.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "194772391548"
  ECR_REPOSITORY: api-monitoring-portal
  DEPLOYMENT_PATH: /opt/api-monitoring-portal

jobs:
  validate-input:
    name: Validate Deployment Input
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail

          if [[ "$TARGET_ENVIRONMENT" == "prod" ]]; then
            if [[ "$CONFIRMATION" != "deploy-prod" ]]; then
              echo "Production deployment requires confirmation: deploy-prod"
              exit 1
            fi
          else
            if [[ "$CONFIRMATION" != "deploy" ]]; then
              echo "Deployment requires confirmation: deploy"
              exit 1
            fi
          fi

          echo "Deployment confirmation accepted for: $TARGET_ENVIRONMENT"

  deploy:
    name: Deploy ${{ inputs.environment }}
    needs: validate-input
    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::194772391548:role/api-monitoring-portal-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Define deployment variables
        id: deployment
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"

          case "$TARGET_ENVIRONMENT" in
            dev)
              APP_PORT="8001"
              ;;
            test)
              APP_PORT="8002"
              ;;
            qa)
              APP_PORT="8003"
              ;;
            prod)
              APP_PORT="8004"
              ;;
            *)
              echo "Unsupported environment: $TARGET_ENVIRONMENT"
              exit 1
              ;;
          esac

          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "app_port=${APP_PORT}" >> "$GITHUB_OUTPUT"

          echo "Target environment: ${TARGET_ENVIRONMENT}"
          echo "Image URI: ${IMAGE_URI}"
          echo "Application port: ${APP_PORT}"

      - name: Verify image exists in ECR
        shell: bash
        run: |
          set -euo pipefail

          aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag="${{ inputs.image_tag }}"

      - name: Find EC2 instance
        id: ec2
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID="$(
            aws ec2 describe-instances \
              --filters \
                "Name=instance-state-name,Values=running" \
                "Name=tag:Project,Values=api-monitoring-portal" \
              --query "Reservations[].Instances[].InstanceId" \
              --output text
          )"

          if [[ -z "$INSTANCE_ID" || "$INSTANCE_ID" == "None" ]]; then
            echo "No running EC2 instance found for api-monitoring-portal."
            exit 1
          fi

          INSTANCE_COUNT="$(wc -w <<< "$INSTANCE_ID")"

          if [[ "$INSTANCE_COUNT" -ne 1 ]]; then
            echo "Expected exactly one running EC2 instance, found: $INSTANCE_COUNT"
            echo "Instances: $INSTANCE_ID"
            exit 1
          fi

          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "Found EC2 instance: ${INSTANCE_ID}"

      - name: Wait for SSM availability
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            STATUS="$(
              aws ssm describe-instance-information \
                --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
                --query "InstanceInformationList[0].PingStatus" \
                --output text
            )"

            echo "SSM attempt ${attempt}/30: ${STATUS}"

            if [[ "$STATUS" == "Online" ]]; then
              echo "SSM instance is online."
              exit 0
            fi

            sleep 10
          done

          echo "EC2 instance did not become available through SSM."
          exit 1

      - name: Prepare deployment archive
        shell: bash
        run: |
          set -euo pipefail

          tar \
            --create \
            --gzip \
            --file deployment-cloud.tar.gz \
            --directory deployment/cloud \
            docker-compose.yml \
            scripts

          ls -lh deployment-cloud.tar.gz

      - name: Upload deployment archive to S3
        shell: bash
        run: |
          set -euo pipefail

          S3_KEY="deployments/${GITHUB_RUN_ID}/deployment-cloud.tar.gz"

          aws s3 cp \
            deployment-cloud.tar.gz \
            "s3://api-monitoring-portal-backups-194772391548/${S3_KEY}"

          echo "S3_KEY=${S3_KEY}" >> "$GITHUB_ENV"

      - name: Generate database password
        id: database
        shell: bash
        run: |
          set -euo pipefail

          POSTGRES_PASSWORD="$(
            openssl rand -base64 36 \
              | tr -d '\n' \
              | tr '/+' '_-'
          )"

          echo "::add-mask::${POSTGRES_PASSWORD}"
          echo "password=${POSTGRES_PASSWORD}" >> "$GITHUB_OUTPUT"

      - name: Deploy through AWS Systems Manager
        id: ssm-deploy
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
          IMAGE_URI: ${{ steps.deployment.outputs.image_uri }}
          POSTGRES_PASSWORD: ${{ steps.database.outputs.password }}
        run: |
          set -euo pipefail

          COMMANDS="$(jq -nc \
            --arg region "$AWS_REGION" \
            --arg bucket "api-monitoring-portal-backups-194772391548" \
            --arg key "$S3_KEY" \
            --arg path "$DEPLOYMENT_PATH" \
            --arg environment "$TARGET_ENVIRONMENT" \
            --arg image "$IMAGE_URI" \
            --arg password "$POSTGRES_PASSWORD" \
            '[
              "set -eu",
              "sudo mkdir -p \($path)/deployment/cloud",
              "sudo aws s3 cp s3://\($bucket)/\($key) /tmp/deployment-cloud.tar.gz --region \($region)",
              "sudo tar -xzf /tmp/deployment-cloud.tar.gz -C \($path)/deployment/cloud",
              "sudo chmod +x \($path)/deployment/cloud/scripts/*.sh",
              "sudo AWS_REGION=\($region) \($path)/deployment/cloud/scripts/deploy-environment.sh \($environment) \($image) \($password)",
              "sudo \($path)/deployment/cloud/scripts/health-check.sh \($environment)"
            ]'
          )"

          COMMAND_ID="$(
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy api-monitoring-portal ${TARGET_ENVIRONMENT}" \
              --parameters commands="$COMMANDS" \
              --query "Command.CommandId" \
              --output text
          )"

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "SSM command ID: ${COMMAND_ID}"

      - name: Wait for deployment result
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
          COMMAND_ID: ${{ steps.ssm-deploy.outputs.command_id }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 60); do
            STATUS="$(
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "Status" \
                --output text
            )"

            echo "Deployment attempt ${attempt}/60: ${STATUS}"

            case "$STATUS" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID"
                exit 1
                ;;
            esac

            sleep 10
          done

          FINAL_STATUS="$(
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text
          )"

          if [[ "$FINAL_STATUS" != "Success" ]]; then
            echo "Deployment did not complete successfully."
            exit 1
          fi

      - name: Display deployment output
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
          COMMAND_ID: ${{ steps.ssm-deploy.outputs.command_id }}
        run: |
          set -euo pipefail

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "{
              Status:Status,
              StandardOutput:StandardOutputContent,
              StandardError:StandardErrorContent
            }"

      - name: Get public application URL
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
          APP_PORT: ${{ steps.deployment.outputs.app_port }}
        run: |
          set -euo pipefail

          PUBLIC_IP="$(
            aws ec2 describe-instances \
              --instance-ids "$INSTANCE_ID" \
              --query "Reservations[0].Instances[0].PublicIpAddress" \
              --output text
          )"

          echo "Deployment completed."
          echo "Environment: ${{ inputs.environment }}"
          echo "Image tag: ${{ inputs.image_tag }}"
          echo "Application URL: http://${PUBLIC_IP}:${APP_PORT}"
          
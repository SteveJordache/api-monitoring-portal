<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>API Monitoring Portal</title>

    <link
        rel="stylesheet"
        href="/static/styles.css"
    >
</head>
<body>
    <header class="page-header">
        <div class="container">
            <h1>API Monitoring Portal</h1>
            <p>
                Create API monitors, run checks manually
                and review recent execution results.
            </p>
        </div>
    </header>

    <main class="container">
        <section
            class="dashboard-grid"
            aria-label="Monitoring summary"
        >
            <article class="summary-card">
                <span class="summary-label">Total</span>
                <strong
                    id="summary-total"
                    class="summary-value"
                >
                    0
                </strong>
            </article>

            <article class="summary-card summary-up">
                <span class="summary-label">Up</span>
                <strong
                    id="summary-up"
                    class="summary-value"
                >
                    0
                </strong>
            </article>

            <article class="summary-card summary-down">
                <span class="summary-label">Down</span>
                <strong
                    id="summary-down"
                    class="summary-value"
                >
                    0
                </strong>
            </article>

            <article class="summary-card summary-inactive">
                <span class="summary-label">Inactive</span>
                <strong
                    id="summary-inactive"
                    class="summary-value"
                >
                    0
                </strong>
            </article>

            <article class="summary-card summary-unknown">
                <span class="summary-label">Not checked</span>
                <strong
                    id="summary-not-checked"
                    class="summary-value"
                >
                    0
                </strong>
            </article>
        </section>

        <section class="panel">
            <h2>Create monitor</h2>

            <form id="monitor-form">
                <div class="form-grid">
                    <label>
                        Name
                        <input
                            id="name"
                            name="name"
                            type="text"
                            required
                        >
                    </label>

                    <label>
                        URL
                        <input
                            id="url"
                            name="url"
                            type="url"
                            placeholder="https://example.com/"
                            required
                        >
                    </label>

                    <label>
                        Method
                        <select
                            id="method"
                            name="method"
                        >
                            <option value="GET">GET</option>
                            <option value="POST">POST</option>
                            <option value="PUT">PUT</option>
                            <option value="PATCH">PATCH</option>
                            <option value="DELETE">DELETE</option>
                        </select>
                    </label>

                    <label>
                        Expected status
                        <input
                            id="expected-status"
                            name="expected_status"
                            type="number"
                            value="200"
                            min="100"
                            max="599"
                            required
                        >
                    </label>

                    <label>
                        Interval in seconds
                        <input
                            id="interval-seconds"
                            name="interval_seconds"
                            type="number"
                            value="60"
                            min="10"
                            required
                        >
                    </label>

                    <label class="checkbox-label">
                        <input
                            id="is-active"
                            name="is_active"
                            type="checkbox"
                            checked
                        >
                        Active
                    </label>
                </div>

                <button type="submit">
                    Create monitor
                </button>

                <p
                    id="form-message"
                    class="message"
                    aria-live="polite"
                ></p>
            </form>
        </section>

        <section class="panel">
            <div class="section-header">
                <h2>Monitors</h2>

                <button
                    id="refresh-monitors"
                    type="button"
                    class="secondary-button"
                >
                    Refresh
                </button>
            </div>

            <div id="monitors-container">
                <p>Loading monitors...</p>
            </div>
        </section>

        <section
            id="results-panel"
            class="panel hidden"
        >
            <div class="section-header">
                <h2 id="results-title">
                    Execution history
                </h2>

                <button
                    id="close-results"
                    type="button"
                    class="secondary-button"
                >
                    Close
                </button>
            </div>

            <div id="results-container"></div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
